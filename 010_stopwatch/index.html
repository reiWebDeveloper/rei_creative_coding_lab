<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Stopwatch</title>

        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="main">

            <div class="stopwatchContainer">

                <div>
                    <header>
                        <h2>STOPWATCH</h2>
                    </header>
                </div>

                <div class="displayContainer">
                    <p id="stopwatchDisplay">00 : 00 : 00</p>
                </div>

                <div class="buttonActions">
                    <button type="button" id="startStopBtn" class="btn">START</button>
                    <button type="button" id="resetBtn" class="btn">RESET</button>
                </div>

            </div>

            <footer>
                <p>Made by Rei Kraja</p>
                <p>Build with Vanilla JavaScript</p>
            </footer>

        </div>

        <script src="script.js" defer></script>
    </body>
</html>
