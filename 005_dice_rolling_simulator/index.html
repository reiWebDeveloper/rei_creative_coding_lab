<!DOCTYPE html>
<html lang="en">
<head>
    <title>Dice Rolling Simulator</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A dice rolling simulator built with vanilla JavaScript">

    <!-- Google font (Poppins) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Dice Rolling Simulator</h1>
    </header>
    <main>
        <div class="dieFace" id="dieFaceId">&#9856;</div>
        <button type="button" class="btn" id="rollDiceBtn">Roll Die</button>
        <ul id="rollHistory"></ul>
        <button type="button" class="btn" id="clearBtn">Clear</button>
    </main>
    <footer class="footer">
            <p id="author">Made by Rei Kraja /</p>
            <p>/ Developed with Vanilla JavaScript</p>
        </footer>
    <script src="script.js" defer></script>
</body>
</html>
