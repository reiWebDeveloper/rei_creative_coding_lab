<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tip Calculator</title>

    <!-- Google font (Poppins) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="mainContainer">
        <div class="tipCalcContainer">
            <div class="calculatorDisplay">
                <div class="amountInput display">
                    <label for="amount">Amount</label>
                    <input id="amount" type="number" max="1500" min="10" placeholder="85">
                    <p id="cautionMessage">An amount above 1,500€ will not be calculated!</p>
                </div>
                <div class="serviceReviewHolder display">
                    <div class="userChoice">
                        <input type="radio" id="verySatisfiedValue" name="service_review" value="very_satisfied">
                        <label>Very Satisfied</label>
                    </div>
                    <div class="userChoice">
                        <input type="radio" id="satisfiedValue" name="service_review" value="satisfied">
                        <label>Satisfied</label>
                    </div>
                    <div class="userChoice">
                        <input type="radio" id="neutralValue" name="service_review" value="neutral">
                        <label>Neutral</label>
                    </div>
                    <div class="userChoice">
                        <input type="radio" id="dissatisfiedValue" name="service_review" value="dissatisfied">
                        <label>Dissatisfied</label>
                    </div>
                    <div class="userChoice">
                        <input type="radio" id="veryDissatisfiedValue" name="service_review" value="very_dissatisfied">
                        <label>Very Dissatisfied</label>
                    </div>
                </div>
                <div class="tipPercentage display">
                    <div class="userChoice">
                        <input type="radio" id="tenPercentValue" name="tip_percentage" value="10">
                        <label>10%</label>
                    </div>
                    <div class="userChoice">
                        <input type="radio" id="fifteenPercentValue" name="tip_percentage" value="15">
                        <label>15%</label>
                    </div>
                    <div class="userChoice">
                        <input type="radio" id="eighteenPercentValue" name="tip_percentage" value="18">
                        <label>18%</label>
                    </div>
                    <div class="userChoice">
                        <input type="radio" id="twentyPercentValue" name="tip_percentage" value="20">
                        <label>20%</label>
                    </div>
                </div>
            </div>
            <div class="tipAmountDisplay">
                <p id="totalTip">18€</p>
            </div>
        </div>
        <button type="button" id="calculateTip">Calculate Tip</button>
        <div class="greetMessage">
            <h4>Thank you for your time. Your <span id="tipAmount"></span> tip will be used for charity.</h4>
        </div>
        <footer>
            <p>Made by Rei Kraja</p>
            <p>Vanilla JavaScript</p>
        </footer>

        <script src="script.js" defer></script>
    </div>
</body>
</html>
